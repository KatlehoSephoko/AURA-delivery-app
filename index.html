<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA 👑 — On-Demand Beauty Ecosystem</title>
    
    <!-- Core UI Engines & CDNs Loaded Directly into the Browser Memory -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Browser-Ready Standalone Supabase Script -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Custom Tailwind Configuration to Support Smooth Dark Mode Transitions -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        fadeIn: 'fadeIn 0.3s ease-out forward',
                    }
                }
            }
        }
    </script>
</head>
<body class="m-0 p-0 antialiased selection:bg-pink-500 selection:text-white transition-colors duration-300">

    <!-- The physical mounting target for your React layout -->
    <div id="root"></div>

    <!-- Babel Compilation Script Block -->
    <script type="text/babel">
        // Access Supabase globally via the browser window bundle
        const { createClient } = window.supabase;
        
        // Configuration Strings (Safe for public viewing on GitHub)
        const supabaseUrl = "YOUR_SUPABASE_URL"; 
        const supabaseAnonKey = "YOUR_SUPABASE_ANON_KEY";
        const supabase = createClient(supabaseUrl, supabaseAnonKey);

        // =====================================================================
        // DICTIONARY LOOKUP TABLE FOR MULTI-LANGUAGE LOCALIZATION (SOUTH AFRICA)
        // =====================================================================
        const translations = {
            en: {
                welcome: "Welcome to South Africa's premier beauty delivery ecosystem.",
                express: "Sixty60 Express & Campus Run",
                subtext: "Experience lightning-fast delivery across major luxury hubs and midnight student residence access.",
                identity: "Identity Portal",
                register: "Register Account Sequence",
                consumer: "Consumer View",
                driver: "Driver View",
                cartTitle: "Checkout Ledger",
                cartEmpty: "Your delivery bag is empty.",
                execute: "Execute Checkout Order ⚡",
                campusTitle: "Midnight Residence Emergency Dispatch Active",
                campusSub: "Servicing hyper-localized hubs up to 2:00 AM.",
                selectCampus: "Select University Hub",
                addBag: "Add Bag",
                fleet: "AURA Central Fleet Tracker",
                fleetSub: "Simulating live delivery routing parameters within South African hubs.",
                noOrders: "No orders submitted to the cloud framework ledger infrastructure yet.",
                advance: "Advance Logistics State 🚀",
                completed: "Completed ✅",
                successAuth: "AURA Account Registered Successfully!",
                successOrder: "AURA Order Logged Safely! Switch to Driver View to track active fulfillment dispatch pipelines."
            },
            zu: {
                welcome: "Siyakwamukela ohlelweni lokulethwa kobuhle oluhamba phambili eNingizimu Afrika.",
                express: "Isithunywa Se-Sixty60 ne-Campus Run",
                subtext: "Thola ukulethwa okusheshayo ezindaweni zokunethezeka nasekufundeni kwabafundi phakathi kwamabili.",
                identity: "Ingosi Kamazisi",
                register: "Bhalisa i-Akhawunti Manje",
                consumer: "Okombukiso Womthengi",
                driver: "Okombukiso Womshayeli",
                cartTitle: "Incwadi Yokukhokha",
                cartEmpty: "Isikhwama sakho sokulethwa singenalutho.",
                execute: "Faka I-oda Manje ⚡",
                campusTitle: "Ukuthunyelwa Kwasemhlabeni Phakathi Kwamabili Kusebenza",
                campusSub: "Sikhonza amakhampasi kuze kukhale ihora lesibili ekuseni.",
                selectCampus: "Khetha Inyuvesi Yakho",
                addBag: "Faka Esikhwameni",
                fleet: "I-AURA Central Fleet Tracker",
                fleetSub: "Ukulingisa imizila yokulethwa bukhoma emikhambasini yaseNingizimu Afrika.",
                noOrders: "Azikho ama-oda athunyelwe ohlelweni lwemininingwane okwamanje.",
                advance: "Yisa Isimo Se-oda Phambili 🚀",
                completed: "Kuqedile ✅",
                successAuth: "I-akhawunti ye-AURA ibhaliswe ngempumelelo!",
                successOrder: "I-oda le-AURA ligcinwe kahle! Shintshela kubuka komshayeli ukuze ulandelele."
            },
            st: {
                welcome: "Re u amohela tsamaisong e etellang pele ea ho tlisa botle Afrika Boroa.",
                express: "Sixty60 Express le Campus Run",
                subtext: "Itemogele phano e lebelo la lehadima ho pholletsa le litsi tsa mabothobotho le phihlello ea phaposi ea baithuti har'a mp'a bosiu.",
                identity: "Photale ea Boitsebiso",
                register: "Ngolisa Akhaonto Hang-hang",
                consumer: "Pono ea Bareki",
                driver: "Pono ea Bakhanni",
                cartTitle: "Buka ea ho Lefa",
                cartEmpty: "Mokotla oa hau oa ho tlisa o shelehile.",
                execute: "Phethela Taelo ea Hau ⚡",
                campusTitle: "Phano ea Tšohanyetso Har'a Mp'a Bosiu e ea Sebetsa",
                campusSub: "E sebeletsa litsi tsa baithuti ho fihlela ka hora ea bobeli hoseng.",
                selectCampus: "Kgetha Univesithi ea Hau",
                addBag: "Kenya Mokotleng",
                fleet: "Setsebi sa ho Track Sefofane sa AURA",
                fleetSub: "Ho etsa tšusumetso ea litsela tsa phano ka hare ho litsi tsa Afrika Boroa.",
                noOrders: "Ha ho litaelo tse rometsoeng tsamaisong ea leru hajoale.",
                advance: "Hatela Pele Boemo ba Phano 🚀",
                completed: "E phethehile ✅",
                successAuth: "Akhaonto ea AURA e ngolisitsoe ka katleho!",
                successOrder: "Taelo ea AURA e bolokiloe hantle! Fetolela ho pono ea mokhanni ho e sala morao."
            }
        };

        // =====================================================================
        // MAIN APPLICATION COMPONENT ENGINE
        // =====================================================================
        function App() {
            // Configuration & Theme States
            const [viewMode, setViewMode] = React.useState('consumer');
            const [isDarkMode, setIsDarkMode] = React.useState(true);
            const [language, setLanguage] = React.useState('en');
            
            // App Core Logic States
            const [selectedDeliveryMode, setSelectedDeliveryMode] = React.useState('Sixty60 Express');
            const [selectedCampus, setSelectedCampus] = React.useState('');
            const [cart, setCart] = React.useState([]);
            const [orderStatus, setOrderStatus] = React.useState('Confirmed');
            const [activeOrderId, setActiveOrderId] = React.useState(null);
            const [userSession, setUserSession] = React.useState(null);
            
            // Authentication Inputs
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [fullName, setFullName] = React.useState('');

            // Quick Shortcut Pointer variable for Active Translations
            const t = translations[language];

            // Monitor and update the DOM element tags whenever system toggles dark mode state
            React.useEffect(() => {
                const rootElement = document.documentElement;
                if (isDarkMode) {
                    rootElement.classList.add('dark');
                    document.body.style.backgroundColor = "#020617"; // slate-950 fallback
                } else {
                    rootElement.classList.remove('dark');
                    document.body.style.backgroundColor = "#f8fafc"; // slate-50 fallback
                }
            }, [isDarkMode]);

            // Premium Retail Product Arrays (ZAR Currency mapping indicators)
            const products = [
                { id: 1, name: "Premium HD Lace Wig (Straight, 24\")", price: 3500, type: "Luxury Concierge", image: "👑" },
                { id: 2, name: "COSRX Advanced Snail Mucin 96 Essence", price: 420, type: "TikTok & K-Beauty Hub", image: "🐌" },
                { id: 3, name: "Luxury Oud Perfume Oil Imp.", price: 1850, type: "Luxury Concierge", image: "✨" },
                { id: 4, name: "Got2b Glued Blasting Freeze Spray", price: 180, type: "Campus Run", image: "🎓" },
                { id: 5, name: "Pro Beauty Blender Makeup Sponge", price: 95, type: "Sixty60 Express", image: "💄" }
            ];

            const filteredProducts = React.useMemo(() => {
                return products.filter(p => p.type === selectedDeliveryMode);
            }, [selectedDeliveryMode]);

            const cartTotal = React.useMemo(() => {
                return cart.reduce((total, item) => total + item.price, 0);
            }, [cart]);

            // Database Relational API Method bindings
            const handleUserSignUp = async (e) => {
                e.preventDefault();
                if (!email || !password || !fullName) return alert("Please fill out all registration fields!");

                const { data, error } = await supabase.auth.signUp({ email, password });
                if (error) return alert("Authentication Error: " + error.message);

                if (data.user) {
                    const { error: profileError } = await supabase
                        .from('profiles')
                        .insert([{ id: data.user.id, full_name: fullName, account_type: viewMode }]);
                    
                    if (profileError) {
                        console.error("Database Trace Error: ", profileError.message);
                    } else {
                        setUserSession(data.user);
                        alert(`${t.successAuth} (${viewMode})`);
                    }
                }
            };

            const handleCheckout = async () => {
                if (cart.length === 0) return alert("Your cart is empty!");
                const fallbackUserId = "00000000-0000-0000-0000-000000000000";
                const currentUserId = userSession ? userSession.id : fallbackUserId;

                const { data, error } = await supabase
                    .from('orders')
                    .insert([{ 
                        user_id: currentUserId, 
                        delivery_mode: selectedDeliveryMode, 
                        total_amount_zar: cartTotal,
                        campus_name: selectedDeliveryMode === 'Campus Run' ? selectedCampus : null,
                        order_status: 'Confirmed'
                    }])
                    .select();

                if (error) {
                    console.error("Supabase Database Connect Error: ", error.message);
                    setActiveOrderId("SIM-" + Math.floor(1000 + Math.random() * 9000));
                } else if (data && data[0]) {
                    setActiveOrderId(data[0].id);
                }

                setOrderStatus('Confirmed');
                setCart([]);
                alert(t.successOrder);
            };

            const advanceOrderStatus = () => {
                const stages = ['Confirmed', 'Packing', 'Departed', 'Arrived'];
                const currentIndex = stages.indexOf(orderStatus);
                if (currentIndex < stages.length - 1) {
                    setOrderStatus(stages[currentIndex + 1]);
                }
            };

            return (
                <div class="min-h-screen transition-colors duration-300 bg-gradient-to-br from-slate-50 via-slate-100 to-pink-50 dark:from-slate-950 dark:via-slate-900 dark:to-purple-950 text-slate-800 dark:text-slate-100 font-sans">
                    
                    {/* TOP ACCELERATED ACCESS AND UTILITIES TOOLBAR BANNER */}
                    <div class="bg-slate-200/60 dark:bg-slate-950/80 border-b border-slate-300 dark:border-slate-800 px-6 py-2 flex justify-end items-center gap-4 text-xs font-bold">
                        
                        <!-- Dynamic Language Localization Select Matrix -->
                        <div class="flex items-center gap-1.5">
                            <span class="opacity-70">🌐</span>
                            <select 
                                value={language} 
                                onChange={(e) => setLanguage(e.target.value)}
                                class="bg-transparent border-none text-slate-700 dark:text-slate-300 font-bold focus:outline-none cursor-pointer"
                            >
                                <option value="en" class="text-slate-900">English</option>
                                <option value="zu" class="text-slate-900">isiZulu</option>
                                <option value="st" class="text-slate-900">Sesotho</option>
                            </select>
                        </div>
                        
                        <span class="text-slate-400 dark:text-slate-700">|</span>

                        <!-- Dynamic Color Theme Environment Toggler Switch -->
                        <button 
                            onClick={() => setIsDarkMode(!isDarkMode)}
                            class="flex items-center gap-1.5 hover:text-pink-500 transition-colors"
                        >
                            <span>{isDarkMode ? '☀️ Light' : '🌙 Dark'}</span>
                        </button>
                    </div>

                    {/* MAIN HEADER DASHBOARD RECTANGLE STICKY STRIP */}
                    <header class="border-b border-slate-200 dark:border-slate-800 bg-white/70 dark:bg-slate-900/80 backdrop-blur sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm dark:shadow-none">
                        <div class="flex items-center gap-2">
                            <span class="text-2xl">👑</span>
                            <h1 class="text-xl font-black tracking-wider bg-gradient-to-r from-pink-500 to-purple-500 dark:from-pink-400 dark:to-purple-400 bg-clip-text text-transparent">AURA</h1>
                        </div>
                        <div class="flex gap-2">
                            <button 
                                onClick={() => setViewMode('consumer')}
                                class={`px-4 py-1.5 rounded-full text-xs font-bold transition-all ${viewMode === 'consumer' ? 'bg-pink-600 text-white shadow-lg shadow-pink-500/20' : 'bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-300 dark:hover:bg-slate-700'}`}
                            >
                                {t.consumer}
                            </button>
                            <button 
                                onClick={() => setViewMode('driver')}
                                class={`px-4 py-1.5 rounded-full text-xs font-bold transition-all ${viewMode === 'driver' ? 'bg-purple-600 text-white shadow-lg shadow-purple-500/20' : 'bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-300 dark:hover:bg-slate-700'}`}
                            >
                                {t.driver}
                            </button>
                        </div>
                    </header>

                    {/* MAIN TWO-COLUMN APPLICATION CONTAINER MESH GRID */}
                    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
                        
                        {/* PORTAL VIEW MODULE DEPLOYMENT COLUMNS */}
                        <div class="lg:col-span-2 space-y-6">
                            
                            {/* Unified User/Driver Identity Registration Module Container */}
                            <div class="p-6 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white/40 dark:bg-slate-900/40 backdrop-blur shadow-sm">
                                <h3 class="text-sm uppercase font-bold tracking-widest text-slate-500 dark:text-slate-400 mb-4 flex items-center gap-2">
                                    <span class="w-2 h-2 rounded-full bg-green-400"></span> {t.identity}
                                </h3>
                                {userSession ? (
                                    <div class="p-4 bg-green-500/10 border border-green-500/30 rounded-xl text-sm text-green-600 dark:text-green-400 font-medium">
                                        Active Cloud Session Authenticated! Profile Token Signature linked to: <span class="font-bold underline">{email}</span>
                                    </div>
                                ) : (
                                    <form onSubmit={handleUserSignUp} class="space-y-3">
                                        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                                            <input type="text" placeholder="Full Name" value={fullName} onChange={(e) => setFullName(e.target.value)} class="bg-white dark:bg-slate-950 border border-slate-300 dark:border-slate-800 rounded-xl p-2.5 text-sm focus:outline-none focus:border-pink-500 text-slate-900 dark:text-white" />
                                            <input type="email" placeholder="Email Address" value={email} onChange={(e) => setEmail(e.target.value)} class="bg-white dark:bg-slate-950 border border-slate-300 dark:border-slate-800 rounded-xl p-2.5 text-sm focus:outline-none focus:border-pink-500 text-slate-900 dark:text-white" />
                                            <input type="password" placeholder="Password" value={password} onChange={(e) => setPassword(e.target.value)} class="bg-white dark:bg-slate-950 border border-slate-300 dark:border-slate-800 rounded-xl p-2.5 text-sm focus:outline-none focus:border-pink-500 text-slate-900 dark:text-white" />
                                        </div>
                                        <button type="submit" class="w-full bg-slate-800 hover:bg-pink-600 dark:bg-slate-800 dark:hover:bg-pink-600 text-white text-xs font-bold uppercase tracking-wider py-2.5 rounded-xl transition-all shadow-md">
                                            {t.register}
                                        </button>
                                    </form>
                                )}
                            </div>

                            {/* DYNAMIC CONSUMER MARKET HUB ROUTER PANEL */}
                            {viewMode === 'consumer' ? (
                                <div class="space-y-6">
                                    {/* Sub-Market Dynamic Navigation Menu Tabs */}
                                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2 bg-slate-200/50 dark:bg-slate-950/80 p-1.5 rounded-2xl border border-slate-300 dark:border-slate-800">
                                        {['Sixty60 Express', 'Campus Run', 'Luxury Concierge', 'TikTok & K-Beauty Hub'].map((mode) => (
                                            <button 
                                                key={mode}
                                                onClick={() => { setSelectedDeliveryMode(mode); setCart([]); }}
                                                class={`py-2 px-3 rounded-xl text-xs font-bold tracking-tight transition-all ${selectedDeliveryMode === mode ? 'bg-gradient-to-r from-pink-500 to-purple-600 text-white shadow-md' : 'text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-200'}`}
                                            >
                                                {mode}
                                            </button>
                                        ))}
                                    </div>

                                    {/* University Localizer Selection Engine Block */}
                                    {selectedDeliveryMode === 'Campus Run' && (
                                        <div class="p-5 rounded-2xl border border-pink-200 dark:border-pink-900/30 bg-pink-500/5 dark:bg-pink-950/10 backdrop-blur flex flex-col md:flex-row gap-4 items-center justify-between shadow-sm">
                                            <div>
                                                <h4 class="font-bold text-pink-600 dark:text-pink-400 text-sm">🎓 {t.campusTitle}</h4>
                                                <p class="text-xs text-slate-500 dark:text-slate-400">{t.campusSub}</p>
                                            </div>
                                            <select 
                                                value={selectedCampus}
                                                onChange={(e) => setSelectedCampus(e.target.value)}
                                                class="bg-white dark:bg-slate-950 border border-slate-300 dark:border-slate-800 text-xs rounded-xl p-2 text-slate-800 dark:text-pink-300 focus:outline-none focus:border-pink-500 font-bold shadow-sm"
                                            >
                                                <option value="">-- {t.selectCampus} --</option>
                                                <option value="Wits Main Campus">Wits University (Johannesburg)</option>
                                                <option value="UP Hatfield">University of Pretoria (Hatfield)</option>
                                                <option value="UJ Kingsway">University of Johannesburg (APK)</option>
                                            </select>
                                        </div>
                                    )}

                                    {/* Dynamic Catalog Portfolio Display Grids */}
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {filteredProducts.map(product => (
                                            <div key={product.id} class="p-4 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-900/20 backdrop-blur flex gap-4 items-center justify-between hover:border-pink-400 dark:hover:border-slate-700 shadow-sm transition-all">
                                                <div class="flex items-center gap-3">
                                                    <div class="text-3xl bg-slate-100 dark:bg-slate-900 p-3 rounded-xl border border-slate-200 dark:border-slate-800">{product.image}</div>
                                                    <div>
                                                        <h4 class="font-bold text-sm text-slate-800 dark:text-slate-200">{product.name}</h4>
                                                        <p class="text-pink-600 dark:text-pink-400 font-black text-sm mt-0.5">R {product.price.toLocaleString('en-ZA')}</p>
                                                    </div>
                                                </div>
                                                <button 
                                                    onClick={() => setCart([...cart, product])}
                                                    class="bg-pink-600 hover:bg-pink-500 text-white font-bold text-xs px-3.5 py-2 rounded-xl shadow-md shadow-pink-500/10 transition-all"
                                                >
                                                    {t.addBag}
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                /* REAL-TIME SIMULATED DRIVER DISPATCH OPERATIONS TRACKER CORE PANEL */
                                <div class="p-6 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white/40 dark:bg-slate-900/40 backdrop-blur space-y-6 shadow-sm">
                                    <div class="flex justify-between items-center">
                                        <div>
                                            <h2 class="text-lg font-black tracking-wide text-purple-600 dark:text-purple-400">🎛️ {t.fleet}</h2>
                                            <p class="text-xs text-slate-500 dark:text-slate-400">{t.fleetSub}</p>
                                        </div>
                                        {activeOrderId && (
                                            <span class="text-[10px] font-mono px-2.5 py-1 bg-purple-100 dark:bg-purple-950 text-purple-700 dark:text-purple-300 border border-purple-200 dark:border-purple-800 rounded-full font-bold">
                                                ID: {activeOrderId}
                                            </span>
                                        )}
                                    </div>

                                    {activeOrderId ? (
                                        <div class="space-y-6">
                                            {/* Visual Progress Checkpoint State Tracker Layout Bar */}
                                            <div class="grid grid-cols-4 gap-2 text-center text-xs">
                                                {['Confirmed', 'Packing', 'Departed', 'Arrived'].map((stage, i, arr) => {
                                                    const active = arr.indexOf(orderStatus) >= i;
                                                    return (
                                                        <div key={stage} class={`p-2.5 rounded-xl border font-bold transition-all ${active ? 'bg-purple-600 dark:bg-purple-950 border-purple-500 text-white dark:text-purple-300 shadow-md' : 'bg-slate-100 dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-400 dark:text-slate-600'}`}>
                                                            <div class="mb-1 text-xs">{i + 1}</div>
                                                            <div class="text-[9px] uppercase tracking-wider font-extrabold">{stage}</div>
                                                        </div>
                                                    );
                                                })}
                                            </div>

                                            <div class="p-4 bg-white dark:bg-slate-950 rounded-xl border border-slate-200 dark:border-slate-800 flex justify-between items-center shadow-sm">
                                                <div class="text-xs space-y-1">
                                                    <p class="text-slate-500 dark:text-slate-400">Logistics Parameter: <span class="text-slate-800 dark:text-slate-200 font-bold">{selectedDeliveryMode}</span></p>
                                                    {selectedCampus && <p class="text-slate-500 dark:text-slate-400">Target Coordinates: <span class="text-pink-600 dark:text-pink-400 font-bold">{selectedCampus}</span></p>}
                                                </div>
                                                <button 
                                                    onClick={advanceOrderStatus}
                                                    disabled={orderStatus === 'Arrived'}
                                                    class="bg-purple-600 hover:bg-purple-500 disabled:bg-slate-300 dark:disabled:bg-slate-800 text-white text-xs font-bold px-4 py-2 rounded-xl transition-all shadow-md"
                                                >
                                                    {orderStatus === 'Arrived' ? t.completed : t.advance}
                                                </button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div class="p-10 text-center border border-dashed border-slate-300 dark:border-slate-800 rounded-2xl text-slate-400 dark:text-slate-500 text-xs font-medium">
                                            {t.noOrders}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* RIGHT REGION COMPONENT: FINANCIAL CHECKOUT LEDGER COLUMN */}
                        <div class="space-y-6">
                            <div class="p-6 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-950/60 backdrop-blur flex flex-col justify-between min-h-[380px] shadow-sm">
                                <div>
                                    <h3 class="text-sm font-black uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-4 flex items-center justify-between">
                                        <span>🛍️ {t.cartTitle}</span>
                                        <span class="text-xs font-mono font-normal text-slate-400">({cart.length})</span>
                                    </h3>
                                    
                                    {cart.length === 0 ? (
                                        <div class="text-center py-14 text-slate-400 dark:text-slate-600 text-xs border border-dashed border-slate-200 dark:border-slate-800 rounded-xl font-medium">
                                            {t.cartEmpty}
                                        </div>
                                    ) : (
                                        <div class="space-y-2 max-h-[220px] overflow-y-auto pr-1">
                                            {cart.map((item, index) => (
                                                <div key={index} class="p-2.5 bg-slate-50 dark:bg-slate-900/50 rounded-xl border border-slate-200 dark:border-slate-800 flex justify-between items-center text-xs shadow-sm">
                                                    <span class="text-slate-700 dark:text-slate-300 font-medium truncate max-w-[150px]">{item.name}</span>
                                                    <span class="text-pink-600 dark:text-pink-400 font-black whitespace-nowrap">R {item.price}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                <div class="pt-4 border-t border-slate-200 dark:border-slate-800 mt-6 space-y-4">
                                    <div class="flex justify-between items-baseline">
                                        <span class="text-xs uppercase font-bold tracking-wider text-slate-400">Total ZAR:</span>
                                        <span class="text-2xl font-black text-pink-600 dark:text-pink-400 tracking-tight">R {cartTotal.toLocaleString('en-ZA')}</span>
                                    </div>
                                    <button 
                                        onClick={handleCheckout}
                                        disabled={cart.length === 0}
                                        class="w-full bg-gradient-to-r from-pink-500 to-purple-600 hover:from-pink-400 hover:to-purple-500 disabled:from-slate-200 disabled:to-slate-200 dark:disabled:from-slate-800 dark:disabled:to-slate-800 text-white text-xs font-black uppercase tracking-wider py-3 rounded-xl transition-all shadow-lg shadow-pink-500/10"
                                    >
                                        {t.execute}
                                    </button>
                                </div>
                            </div>
                        </div>

                    </main>
                </div>
            );
        }

        // Mount and boot up the system onto the webpage DOM targeting root anchor
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
